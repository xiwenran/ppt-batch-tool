name: 自动打包 Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 安装依赖
        run: pip install PyQt6 PyMuPDF comtypes pyinstaller

      - name: 注入构建标识
        run: |
          $sha = git rev-parse --short HEAD
          "BUILD = `"$sha`"" | Out-File -FilePath _build_info.py -Encoding utf8
          Write-Host "构建标识: $sha"
        shell: pwsh

      - name: PyInstaller 打包
        run: |
          pyinstaller `
            --windowed `
            --name "PPT转图片" `
            --add-data "_build_info.py;." `
            --noconfirm `
            main.py
        shell: pwsh

      - name: 压缩为 ZIP
        run: Compress-Archive -Path "dist\PPT转图片" -DestinationPath "dist\PPT转图片_windows_x64.zip"
        shell: pwsh

      - name: 上传到 GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = $null
          $tagFile = "RELEASE_TAG"
          if (Test-Path $tagFile) {
            $tag = (Get-Content $tagFile -Raw).Trim()
            Write-Host "从 RELEASE_TAG 读取 tag: $tag"
          }
          if (-not $tag) {
            $tag = gh release list --repo $env:GITHUB_REPOSITORY --limit 1 --json tagName --jq '.[0].tagName' 2>$null
            Write-Host "从 gh release list 读取 tag: $tag"
          }
          if ($tag) {
            gh release upload $tag "dist\PPT转图片_windows_x64.zip" --repo $env:GITHUB_REPOSITORY --clobber
            Write-Host "已附加到 Release $tag"
          } else {
            Write-Host "未找到 Release，跳过上传"
          }
        shell: pwsh

      - name: 保留 Artifact 备份
        uses: actions/upload-artifact@v4
        with:
          name: PPT转图片_windows_x64
          path: dist/PPT转图片_windows_x64.zip
